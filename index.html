<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Ritesh Kumar — Portfolio</title>
  <meta name="description" content="Researcher in Indoor Localization, Machine Learning & Intelligent IoT Systems" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- React & Babel via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --bg2: #111; --bg3: #1a1a1a;
      --gold: #c8a96e; --gold2: #e0c080;
      --text: #f0ede8; --dim: #888; --mute: #444;
      --border: rgba(200,169,110,0.18);
      --sans: 'Inter', sans-serif;
      --serif: 'Playfair Display', serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; line-height: 1.7; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    img { display: block; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      padding: 1.25rem 3rem;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.4s, border-color 0.4s, backdrop-filter 0.4s;
    }
    .nav--scrolled { background: rgba(8,8,8,0.94); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; color: var(--gold); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); transition: color 0.25s; position: relative; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--gold); }
    .nav-links a.active::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 1px; background: var(--gold); }

    /* HERO */
    .hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
    .hero-text { display: flex; flex-direction: column; justify-content: center; padding: 7rem 4rem 5rem 5rem; }
    .hero-label { font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.7s 0.2s forwards; }
    .hero-name { font-family: var(--serif); font-size: clamp(2.8rem, 5vw, 5rem); font-weight: 700; line-height: 1.05; margin-bottom: 0.6rem; opacity: 0; animation: fadeUp 0.7s 0.35s forwards; }
    .hero-name em { font-style: italic; color: var(--gold); }
    .hero-role { font-family: var(--serif); font-style: italic; font-size: clamp(1rem, 1.8vw, 1.2rem); color: var(--dim); margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.7s 0.5s forwards; }
    .hero-desc { font-size: 0.9rem; color: var(--dim); max-width: 420px; line-height: 1.85; margin-bottom: 3rem; opacity: 0; animation: fadeUp 0.7s 0.65s forwards; }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0; opacity: 0; animation: fadeUp 0.7s 0.8s forwards; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.75rem; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; border-radius: 2px; transition: all 0.3s; cursor: pointer; }
    .btn-primary { background: var(--gold); color: var(--bg); border: 1px solid var(--gold); }
    .btn-primary:hover { background: var(--gold2); border-color: var(--gold2); }
    .btn-ghost { background: transparent; color: var(--dim); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .hero-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 3rem; font-size: 0.78rem; color: var(--mute); opacity: 0; animation: fadeUp 0.7s 0.95s forwards; }
    .hero-meta-item { display: flex; align-items: center; gap: 0.4rem; }
    .hero-meta-item svg { color: var(--gold); flex-shrink: 0; }

    /* PASSPORT PHOTO */
    .hero-photo-panel { display: flex; align-items: center; justify-content: center; background: var(--bg); opacity: 0; animation: fadeIn 1.2s 0.3s forwards; position: relative; }
    /* subtle vertical gold line on left edge */
    .hero-photo-panel::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 1px; background: linear-gradient(to bottom, transparent, var(--gold), transparent); }
    .passport-frame { display: inline-flex; flex-direction: column; align-items: center; gap: 1.4rem; }
    .passport-card { position: relative; width: 320px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--bg2); box-shadow: 0 32px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(200,169,110,0.14), 0 0 60px rgba(200,169,110,0.06); }
    .passport-card::before { content: ''; display: block; height: 3px; background: linear-gradient(to right, var(--gold), var(--gold2), var(--gold)); }
    .passport-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: center top; filter: grayscale(8%) contrast(1.05); transition: filter 0.4s; }
    .passport-card:hover img { filter: grayscale(0%) contrast(1.08); }
    .passport-info { padding: 0.85rem 1rem 1rem; border-top: 1px solid var(--border); }
    .passport-name { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; color: var(--text); margin-bottom: 0.2rem; }
    .passport-title-text { font-size: 0.62rem; color: var(--dim); letter-spacing: 0.04em; }
    .photo-badge { font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); background: var(--bg2); border: 1px solid var(--border); border-radius: 2px; padding: 0.45rem 0.9rem; }

    /* SCROLL CUE */
    .hero-scroll { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mute); z-index: 10; animation: bounce 2.5s infinite; }
    .hero-scroll-line { width: 1px; height: 36px; background: linear-gradient(to bottom, var(--gold), transparent); }

    /* SECTIONS */
    .section { padding: 6rem 5rem; max-width: 1300px; margin: 0 auto; }
    .sh { display: flex; align-items: baseline; gap: 1.25rem; margin-bottom: 3.5rem; }
    .sh-num { font-size: 0.65rem; color: var(--gold); letter-spacing: 0.22em; font-weight: 500; }
    .sh-title { font-family: var(--serif); font-size: clamp(1.6rem, 3.5vw, 2.4rem); font-weight: 700; }
    .sh-line { flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }

    /* REVEAL */
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s cubic-bezier(.16,1,.3,1), transform 0.7s cubic-bezier(.16,1,.3,1); }
    .reveal.visible { opacity: 1; transform: none; }

    /* ABOUT */
    .about-body { font-family: var(--serif); font-size: 1.1rem; line-height: 1.95; color: var(--dim); max-width: 760px; margin-bottom: 2.5rem; }
    .about-body em { color: var(--gold); font-style: italic; }
    .chips { display: flex; flex-wrap: wrap; gap: 0.65rem; }
    .chip { display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.45rem 1rem; border: 1px solid var(--border); border-radius: 2px; font-size: 0.75rem; letter-spacing: 0.06em; color: var(--dim); background: var(--bg2); transition: all 0.25s; cursor: default; }
    .chip:hover { border-color: var(--gold); color: var(--gold); }
    .chip::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

    /* TIMELINE */
    .timeline { border-left: 1px solid var(--border); padding-left: 2.5rem; }
    .tl-item { position: relative; padding-bottom: 3rem; }
    .tl-item::before { content: ''; position: absolute; left: -2.5rem; top: 0.4rem; transform: translateX(-50%); width: 9px; height: 9px; border-radius: 50%; border: 2px solid var(--gold); background: var(--bg); transition: background 0.25s; }
    .tl-item:hover::before { background: var(--gold); }
    .tl-period { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.35rem; }
    .tl-role { font-size: 1rem; font-weight: 600; margin-bottom: 0.2rem; }
    .tl-org { font-family: var(--serif); font-style: italic; color: var(--dim); font-size: 0.92rem; margin-bottom: 0.7rem; }
    .tl-points { list-style: none; }
    .tl-points li { font-size: 0.85rem; color: var(--dim); padding: 0.2rem 0 0.2rem 1.1rem; position: relative; }
    .tl-points li::before { content: '→'; position: absolute; left: 0; color: var(--gold); font-size: 0.78rem; }

    /* WORKS */
    .works-section { padding: 6rem 0; overflow: hidden; }
    .works-header { padding: 0 5rem; max-width: 1300px; margin: 0 auto 3.5rem; }
    .works-strip { display: flex; overflow-x: auto; gap: 1.25rem; padding: 0.5rem 5rem 2rem; scrollbar-width: none; cursor: grab; }
    .works-strip::-webkit-scrollbar { display: none; }
    .works-strip.grabbing { cursor: grabbing; }
    .work-card { flex: 0 0 360px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: all 0.35s cubic-bezier(.16,1,.3,1); }
    .work-card:hover { transform: translateY(-6px); border-color: rgba(200,169,110,0.35); }
    .work-visual { height: 200px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: 800; letter-spacing: -0.05em; color: rgba(200,169,110,0.07); position: relative; overflow: hidden; }
    .work-visual-emoji { position: absolute; font-size: 2.4rem; }
    .work-body { padding: 1.4rem; }
    .work-num { font-size: 0.62rem; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 0.4rem; }
    .work-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.4rem; }
    .work-desc { font-size: 0.8rem; color: var(--dim); line-height: 1.6; margin-bottom: 1rem; }
    .work-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .work-tag { font-size: 0.6rem; letter-spacing: 0.08em; padding: 0.22rem 0.6rem; background: rgba(200,169,110,0.1); border-radius: 2px; color: var(--gold); }

    /* PUBLICATIONS */
    .pub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }
    .pub-card { padding: 1.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 3px; position: relative; overflow: hidden; transition: all 0.35s cubic-bezier(.16,1,.3,1); cursor: pointer; }
    .pub-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(to right, var(--gold), transparent); transform: scaleX(0); transform-origin: left; transition: transform 0.35s; }
    .pub-card:hover { transform: translateY(-3px); border-color: rgba(200,169,110,0.3); }
    .pub-card:hover::before { transform: scaleX(1); }
    .pub-type { font-size: 0.6rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.65rem; }
    .pub-title { font-size: 0.88rem; font-weight: 500; line-height: 1.5; margin-bottom: 0.65rem; }
    .pub-journal { font-family: var(--serif); font-style: italic; font-size: 0.82rem; color: var(--gold); margin-bottom: 0.4rem; }
    .pub-authors { font-size: 0.72rem; color: var(--mute); }

    /* SKILLS */
    .skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
    .skill-group { padding: 1.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 3px; transition: all 0.25s; }
    .skill-group:hover { border-color: rgba(200,169,110,0.3); transform: translateY(-2px); }
    .sg-title { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
    .sg-items { display: flex; flex-wrap: wrap; gap: 0.45rem; }
    .sg-item { font-size: 0.78rem; color: var(--dim); padding: 0.28rem 0.7rem; background: var(--bg3); border-radius: 2px; transition: color 0.25s; }
    .skill-group:hover .sg-item { color: var(--text); }

    /* EDUCATION */
    .edu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.25rem; }
    .edu-card { padding: 1.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 3px; transition: all 0.25s; position: relative; overflow: hidden; }
    .edu-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(to right, var(--gold), transparent); transform: scaleX(0); transform-origin: left; transition: transform 0.35s; }
    .edu-card:hover { transform: translateY(-2px); }
    .edu-card:hover::after { transform: scaleX(1); }
    .edu-year { font-size: 0.62rem; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 0.5rem; }
    .edu-degree { font-size: 0.97rem; font-weight: 600; margin-bottom: 0.25rem; }
    .edu-inst { font-family: var(--serif); font-style: italic; color: var(--dim); font-size: 0.9rem; margin-bottom: 0.4rem; }
    .edu-spec { font-size: 0.78rem; color: var(--mute); }
    .edu-thesis { margin-top: 0.7rem; font-size: 0.76rem; color: var(--mute); font-style: italic; }

    /* AWARDS */
    .awards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
    .award-card { padding: 1.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 3px; display: flex; gap: 1rem; align-items: flex-start; transition: all 0.25s; }
    .award-card:hover { border-color: rgba(200,169,110,0.3); transform: translateY(-2px); }
    .award-icon { font-size: 1.4rem; flex-shrink: 0; width: 2.4rem; height: 2.4rem; display: flex; align-items: center; justify-content: center; background: rgba(200,169,110,0.1); border-radius: 3px; }
    .award-name { font-size: 0.88rem; font-weight: 600; margin-bottom: 0.2rem; }
    .award-org { font-size: 0.78rem; color: var(--dim); }

    /* CONTACT */
    .contact-section { text-align: center; padding: 9rem 4rem; }
    .contact-big { font-family: var(--serif); font-size: clamp(3rem, 9vw, 9rem); font-weight: 700; line-height: 1; background: linear-gradient(135deg, var(--text) 0%, var(--gold) 55%, var(--mute) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1.75rem; }
    .contact-sub { font-family: var(--serif); font-style: italic; font-size: 1.15rem; color: var(--dim); margin-bottom: 3rem; }
    .contact-links { display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap; }
    .contact-link { display: inline-flex; align-items: center; gap: 0.55rem; padding: 0.8rem 1.8rem; border: 1px solid var(--border); border-radius: 2px; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); background: var(--bg2); transition: all 0.25s; }
    .contact-link:hover { background: var(--gold); border-color: var(--gold); color: var(--bg); transform: translateY(-2px); }

    /* BACK TO TOP */
    .back-top { position: fixed; bottom: 2rem; right: 2rem; z-index: 100; width: 42px; height: 42px; border: 1px solid var(--border); border-radius: 3px; background: var(--bg2); color: var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; opacity: 0; pointer-events: none; }
    .back-top.visible { opacity: 1; pointer-events: auto; }
    .back-top:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); transform: translateY(-2px); }

    /* FOOTER */
    .footer { padding: 1.75rem 4rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.68rem; color: var(--mute); letter-spacing: 0.08em; }

    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(7px); } }

    /* MOBILE NAV TOGGLE */
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 0.25rem; }
    .nav-toggle span { display: block; width: 22px; height: 1.5px; background: var(--dim); margin: 5px 0; transition: all 0.3s; }
    .nav-mobile { display: none; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      nav, .nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .nav-toggle { display: block; }
      .nav-mobile { display: flex; flex-direction: column; position: fixed; top: 56px; left: 0; right: 0; background: rgba(8,8,8,0.97); backdrop-filter: blur(16px); padding: 1.5rem; gap: 1rem; border-bottom: 1px solid var(--border); z-index: 199; }
      .nav-mobile a { font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
      .hero { grid-template-columns: 1fr; }
      .hero-photo-panel { padding: 3rem 1.5rem 1rem; order: -1; }
      .passport-card { width: 200px; }
      .skills-grid { grid-template-columns: 1fr; }
      .hero-text { padding: 3rem 2rem 4rem; text-align: center; }
      .hero-desc { margin: 0 auto 2.5rem; }
      .hero-actions { justify-content: center; }
      .hero-meta { justify-content: center; }
      .section { padding: 4rem 1.75rem; }
      .works-header { padding: 0 1.75rem; }
      .works-strip { padding: 0 1.75rem 1.5rem; }
      .footer { flex-direction: column; gap: 0.4rem; text-align: center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        const obs = new IntersectionObserver(entries => {
          entries.forEach((e, i) => {
            if (e.isIntersecting) {
              setTimeout(() => e.target.classList.add('visible'), i * 70);
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.08 });
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);
    }

    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const [activeSection, setActiveSection] = useState('');

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      useEffect(() => {
        const sectionIds = NAV_LINKS.map(l => l.href.replace('#', ''));
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) setActiveSection(e.target.id); });
        }, { rootMargin: '-40% 0px -55% 0px' });
        sectionIds.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
        return () => obs.disconnect();
      }, []);

      const close = () => setMenuOpen(false);

      return (
        <>
          <nav className={`nav${scrolled ? ' nav--scrolled' : ''}`}>
            <div className="nav-logo">RK.</div>
            <ul className="nav-links">
              {NAV_LINKS.map(l => (
                <li key={l.href}>
                  <a href={l.href} className={activeSection === l.href.replace('#','') ? 'active' : ''}>{l.label}</a>
                </li>
              ))}
            </ul>
            <button className="nav-toggle" onClick={() => setMenuOpen(o => !o)} aria-label="Menu">
              <span /><span /><span />
            </button>
          </nav>
          {menuOpen && (
            <div className="nav-mobile">
              {NAV_LINKS.map(l => (
                <a key={l.href} href={l.href} onClick={close}>{l.label}</a>
              ))}
            </div>
          )}
        </>
      );
    }

    function Works() {
      const stripRef = useRef(null);
      const [grabbing, setGrabbing] = useState(false);
      const drag = useRef({ down: false, startX: 0, scrollLeft: 0 });

      const onMouseDown = e => {
        drag.current = { down: true, startX: e.pageX - stripRef.current.offsetLeft, scrollLeft: stripRef.current.scrollLeft };
        setGrabbing(true);
      };
      const onMouseUp = () => { drag.current.down = false; setGrabbing(false); };
      const onMouseMove = e => {
        if (!drag.current.down) return;
        e.preventDefault();
        stripRef.current.scrollLeft = drag.current.scrollLeft - (e.pageX - stripRef.current.offsetLeft - drag.current.startX) * 1.4;
      };

      return (
        <div className="works-section" id="works">
          <div className="works-header">
            <SectionHeader num="03" title="Selected Works" />
          </div>
          <div
            ref={stripRef}
            className={`works-strip${grabbing ? ' grabbing' : ''}`}
            onMouseDown={onMouseDown}
            onMouseLeave={onMouseUp}
            onMouseUp={onMouseUp}
            onMouseMove={onMouseMove}
